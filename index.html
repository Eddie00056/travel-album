// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-from="globe.jsx">
/* global React, d3, topojson */
const { useEffect, useRef, useState, useCallback, useImperativeHandle, forwardRef } = React;

// fibonacci sphere — even distribution of points on a sphere, returned as [lon,lat]
function fibonacciSphere(n) {
  const pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - (i / (n - 1)) * 2; // -1..1
    const r = Math.sqrt(1 - y * y);
    const theta = golden * i;
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    // convert to lon/lat
    const lat = Math.asin(y) * 180 / Math.PI;
    const lon = Math.atan2(z, x) * 180 / Math.PI;
    pts.push([lon, lat]);
  }
  return pts;
}

// hex → [r,g,b]
function hexToRgb(hex) {
  const h = (hex || '#f5c542').replace('#', '');
  const v = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
  const n = parseInt(v, 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

const Globe = forwardRef(function Globe(props, ref) {
  const {
    onCountryClick,
    onHoverChange,
    visited = {},
    routes = {},
    focusIso = null,
    tweaks = {},
    onCountriesLoaded,
    landing = false, // when true: suspend spin, push globe down (countries stay drawn)
    photoMarkers = [],
  } = props;

  // photo markers — DOM refs by iso so we can mutate transform directly each frame
  // (no React re-render per rAF tick). Also a ref to the latest marker list.
  const markerRefs = useRef({});
  const photoMarkersRef = useRef(photoMarkers);
  useEffect(() => { photoMarkersRef.current = photoMarkers; }, [photoMarkers]);

  const canvasRef = useRef(null);
  const overlayRef = useRef(null);
  const containerRef = useRef(null);

  // mutable state in refs so we can use in raf without re-rendering
  const stateRef = useRef({
    rotation: [20, -15, 0],
    velocity: [0, 0],
    isDragging: false,
    lastPointer: null,
    countries: null,
    cities: null,
    hoverIso: null,
    pixelRatio: Math.min(window.devicePixelRatio || 1, 2),
    width: 0, height: 0,
    autoSpin: true,
    targetRotation: null, // for focus animations
    lastFrameTime: 0,
    zoom: 1.3, // 1.3 = default, max ~6
    targetZoom: null,
    // landing animation: progress 1 → 0 over LANDING_DURATION ms with easeInOutCubic.
    landingProgress: landing ? 1 : 0,
    landingAnim: null,
    verticalOffsetPx: 0,
  });

  const [loaded, setLoaded] = useState(false);
  const [tooltipPos, setTooltipPos] = useState(null);
  const [hoverCountry, setHoverCountry] = useState(null);

  // expose imperative methods
  useImperativeHandle(ref, () => ({
    flyTo: (lon, lat) => {
      stateRef.current.targetRotation = [-lon, -lat, 0];
      stateRef.current.autoSpin = false;
    },
    focusCountry: (iso) => {
      const s = stateRef.current;
      if (!s.countries) return;
      const country = s.countries.features.find(f => f.properties.iso === iso);
      if (country) {
        const c = d3.geoCentroid(country);
        s.targetRotation = [-c[0], -c[1], 0];
        s.targetZoom = 2.4;
        s.autoSpin = false;
      }
    },
    resetZoom: () => {
      stateRef.current.targetZoom = 1.3;
    },
    getZoom: () => stateRef.current.zoom,
  }), []);

  // ===== load topojson data =====
  useEffect(() => {
    let cancelled = false;
    async function load() {
      const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      const topo = await resp.json();
      const countries = topojson.feature(topo, topo.objects.countries);
      // attach iso codes — world-atlas uses numeric id (M49). map a few common ones to alpha-3
      // Actually world-atlas countries have .id = numeric code as string, .properties.name
      // We'll use numeric id as iso for storage.
      countries.features.forEach(f => {
        f.properties.iso = f.id;
      });

      if (cancelled) return;
      stateRef.current.countries = countries;
      setLoaded(true);
      onCountriesLoaded && onCountriesLoaded(countries);

      // load populated places (small ~243-city dataset) in background
      try {
        const r2 = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_populated_places_simple.geojson');
        const cities = await r2.json();
        if (!cancelled) stateRef.current.cities = cities;
      } catch (e) { console.warn('cities load failed', e); }
    }
    load().catch(err => console.error('globe load failed', err));
    return () => { cancelled = true; };
  }, []);

  // ===== resize =====
  useEffect(() => {
    const onResize = () => {
      const c = canvasRef.current;
      if (!c) return;
      const w = window.innerWidth;
      const h = window.innerHeight;
      const dpr = stateRef.current.pixelRatio;
      c.width = w * dpr;
      c.height = h * dpr;
      c.style.width = w + 'px';
      c.style.height = h + 'px';
      stateRef.current.width = w;
      stateRef.current.height = h;
    };
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // ===== landing animation =====
  const LANDING_DURATION = 2400; // slow, deliberate rise
  const LANDING_OFFSET_VH = 0.78; // 78% of viewport — only the crown peeks above the bottom
  useEffect(() => {
    const s = stateRef.current;
    s.landingAnim = {
      from: s.landingProgress,
      to: landing ? 1 : 0,
      start: performance.now(),
      duration: LANDING_DURATION,
    };
  }, [landing]);

  // ===== render loop =====
  useEffect(() => {
    let raf;
    const draw = (t) => {
      const s = stateRef.current;
      const c = canvasRef.current;
      if (!c) { raf = requestAnimationFrame(draw); return; }
      const dt = s.lastFrameTime ? Math.min(0.05, (t - s.lastFrameTime) / 1000) : 0.016;
      s.lastFrameTime = t;

      const ctx = c.getContext('2d');
      const w = s.width, h = s.height;
      const dpr = s.pixelRatio;

      // reset per-frame geometry that the tooltip placement reads
      s.lastCityBoxes = [];
      s.lastRoutePath = null;
      s.lastDestinationPoint = null;

      // physics
      const autoSpinEnabled = tweaks.autoSpin !== false;
      if (!s.isDragging) {
        // velocity decay
        s.velocity[0] *= 0.93;
        s.velocity[1] *= 0.93;
        // ease to target rotation if set
        if (s.targetRotation) {
          const k = 0.06;
          s.rotation[0] += (s.targetRotation[0] - s.rotation[0]) * k;
          s.rotation[1] += (s.targetRotation[1] - s.rotation[1]) * k;
          if (Math.abs(s.targetRotation[0] - s.rotation[0]) < 0.1 &&
              Math.abs(s.targetRotation[1] - s.rotation[1]) < 0.1) {
            s.targetRotation = null;
          }
        } else {
          s.rotation[0] += s.velocity[0] * dt * 60;
          s.rotation[1] += s.velocity[1] * dt * 60;
          if (autoSpinEnabled && Math.abs(s.velocity[0]) < 0.05 && !isLanding) {
            // gentle auto-spin — persistent. Slows down a touch when zoomed in
            // so cities don't whip past, and pauses while hovering a country
            // so the tooltip stays legible.
            const zoomDamp = 1 / Math.max(1, s.zoom * 0.8);
            const hoverDamp = s.hoverIso ? 0.15 : 1;
            s.rotation[0] += dt * 3.5 * zoomDamp * hoverDamp;
          }
        }
        // clamp latitude
        s.rotation[1] = Math.max(-80, Math.min(80, s.rotation[1]));
      }

      // smooth zoom toward target
      if (s.targetZoom !== null) {
        s.zoom += (s.targetZoom - s.zoom) * 0.12;
        if (Math.abs(s.targetZoom - s.zoom) < 0.005) {
          s.zoom = s.targetZoom;
          s.targetZoom = null;
        }
      }

      // setup projection
      const size = Math.min(w, h);
      const radius = size * 0.36 * s.zoom;

      // ── landing animation: time-based easeInOutCubic for frame-rate-independent motion
      if (s.landingAnim) {
        const elapsed = t - s.landingAnim.start;
        const u = Math.min(1, Math.max(0, elapsed / s.landingAnim.duration));
        const e = u < 0.5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2;
        s.landingProgress = s.landingAnim.from + (s.landingAnim.to - s.landingAnim.from) * e;
        if (u >= 1) { s.landingProgress = s.landingAnim.to; s.landingAnim = null; }
      }
      s.verticalOffsetPx = s.landingProgress * LANDING_OFFSET_VH * h;
      const yOff = s.verticalOffsetPx;
      const isLanding = s.landingProgress > 0.02;
      const countriesAlpha = 1;

      const projection = d3.geoOrthographic()
        .scale(radius)
        .translate([w / 2, h / 2 + yOff])
        .rotate(s.rotation)
        .clipAngle(90);

      const path = d3.geoPath(projection, ctx);

      // scale for dpr
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      // ===== outer atmosphere glow — subtle so the globe stays sharp =====
      const cx = w / 2, cy = h / 2 + yOff;
      const sphereStyle = tweaks.sphereStyle || 'glass';

      const glowAlpha = sphereStyle === 'halo' ? 0.26 : sphereStyle === 'void' ? 0 : 0.12;
      if (glowAlpha > 0) {
        // Additive ("lighter") glow so the bloom blends into the dark background
        // instead of leaving a hard edge where the sphere covers the inner stop.
        // Two passes — a tight rim bloom + a wide soft halo with very gradual falloff.
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';

        // tight rim bloom — starts right at the sphere edge, fades over a short range
        const corona = ctx.createRadialGradient(cx, cy, radius * 0.99, cx, cy, radius * 1.28);
        corona.addColorStop(0.00, `rgba(244,241,234,${glowAlpha})`);
        corona.addColorStop(0.25, `rgba(244,241,234,${glowAlpha * 0.55})`);
        corona.addColorStop(0.60, `rgba(244,241,234,${glowAlpha * 0.18})`);
        corona.addColorStop(1.00, 'rgba(244,241,234,0)');
        ctx.fillStyle = corona;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.28, 0, Math.PI * 2);
        ctx.fill();

        // wide atmospheric halo — very gradual, reaches further out for ambient bloom
        const halo = ctx.createRadialGradient(cx, cy, radius * 1.05, cx, cy, radius * 1.90);
        halo.addColorStop(0.00, `rgba(244,241,234,${glowAlpha * 0.45})`);
        halo.addColorStop(0.30, `rgba(244,241,234,${glowAlpha * 0.22})`);
        halo.addColorStop(0.65, `rgba(244,241,234,${glowAlpha * 0.07})`);
        halo.addColorStop(1.00, 'rgba(244,241,234,0)');
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.90, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      // ===== sphere base — picks a palette per style =====
      // palette: [base color, highlightAlpha, rimColor, rimAlpha]
      const PALETTES = {
        void:     { base: '#000000', baseA: 0,    hiA: 0,    rim: '#f4f1ea', rimA: 0.55 },
        glass:    { base: '#0a0a0d', baseA: 0.78, hiA: 0.08, rim: '#f4f1ea', rimA: 0.42 },
        charcoal: { base: '#1a1a1f', baseA: 0.95, hiA: 0.10, rim: '#f4f1ea', rimA: 0.5 },
        ink:      { base: '#06060a', baseA: 1,    hiA: 0.06, rim: '#f4f1ea', rimA: 0.6 },
        cream:    { base: '#1f1d18', baseA: 1,    hiA: 0.12, rim: '#f4f1ea', rimA: 0.6 },
        ocean:    { base: '#0a1218', baseA: 1,    hiA: 0.10, rim: '#a8c0d0', rimA: 0.55 },
        halo:     { base: '#0a0a0d', baseA: 0.6,  hiA: 0.07, rim: '#f4f1ea', rimA: 0.65 },
      };
      const pal = PALETTES[sphereStyle] || PALETTES.glass;

      // fill the sphere disc with the base color (gives sharp circle silhouette)
      if (pal.baseA > 0) {
        ctx.save();
        ctx.globalAlpha = pal.baseA;
        ctx.fillStyle = pal.base;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // top-left highlight for 3d feel
      if (pal.hiA > 0) {
        const hi = ctx.createRadialGradient(cx - radius * 0.45, cy - radius * 0.4, radius * 0.05, cx, cy, radius);
        hi.addColorStop(0, `rgba(244,241,234,${pal.hiA})`);
        hi.addColorStop(0.55, `rgba(244,241,234,${pal.hiA * 0.25})`);
        hi.addColorStop(1, 'rgba(244,241,234,0)');
        ctx.fillStyle = hi;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // bottom-right shadow for added depth
      const sh = ctx.createRadialGradient(cx + radius * 0.4, cy + radius * 0.45, radius * 0.05, cx + radius * 0.3, cy + radius * 0.3, radius * 1.1);
      sh.addColorStop(0, 'rgba(0,0,0,0.5)');
      sh.addColorStop(0.7, 'rgba(0,0,0,0.15)');
      sh.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = sh;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      ctx.restore();

      // sphere rim — softer edge (inner shadow does the heavy lifting)
      ctx.strokeStyle = `rgba(${(() => { const [r,g,b]=hexToRgb(pal.rim); return `${r},${g},${b}`; })()},${pal.rimA * 0.55})`;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.stroke();

      // inner shadow vignette — darkens near the edge so the rim doesn't read as harsh
      const innerShadow = ctx.createRadialGradient(cx, cy, radius * 0.55, cx, cy, radius);
      innerShadow.addColorStop(0, 'rgba(0,0,0,0)');
      innerShadow.addColorStop(0.7, 'rgba(0,0,0,0.18)');
      innerShadow.addColorStop(0.95, 'rgba(0,0,0,0.55)');
      innerShadow.addColorStop(1, 'rgba(0,0,0,0.75)');
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = innerShadow;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      ctx.restore();

      // soft inner highlight — a brighter ring just inside the rim for depth
      const inner = ctx.createRadialGradient(cx, cy, radius * 0.93, cx, cy, radius);
      inner.addColorStop(0, 'rgba(244,241,234,0)');
      inner.addColorStop(0.85, 'rgba(244,241,234,0.05)');
      inner.addColorStop(1, 'rgba(244,241,234,0.18)');
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = inner;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
      ctx.restore();

      // graticule removed

      // ===== build set of visited centroids to map iso → fill =====
      const visitedIsos = visited;
      const hoverIso = s.hoverIso;

      // ===== draw country fills (visited + hover) =====
      const fillStyle = tweaks.fillStyle || 'wash';
      const accent = tweaks.visitedColor || '#f5c542';
      const [aR, aG, aB] = hexToRgb(accent);
      const fillAlpha = fillStyle === 'bright' ? 0.78 : fillStyle === 'outline' ? 0 : 0.45;

      // ===== country fills + outlines + cities + routes — fade in as landing finishes =====
      if (s.countries && countriesAlpha > 0) {
       ctx.save();
       ctx.globalAlpha = countriesAlpha;
        if (fillAlpha > 0) {
          ctx.fillStyle = `rgba(${aR}, ${aG}, ${aB}, ${fillAlpha})`;
          for (const f of s.countries.features) {
            if (visitedIsos[f.properties.iso]) {
              ctx.beginPath();
              path(f);
              ctx.fill();
            }
          }
        }
        // hover fill — glowy version of the accent color
        if (hoverIso && !visitedIsos[hoverIso]) {
          const hf = s.countries.features.find(f => f.properties.iso === hoverIso);
          if (hf) {
            ctx.save();
            ctx.shadowColor = `rgba(${aR}, ${aG}, ${aB}, 0.85)`;
            ctx.shadowBlur = 18;
            ctx.fillStyle = `rgba(${aR}, ${aG}, ${aB}, 0.22)`;
            ctx.beginPath();
            path(hf);
            ctx.fill();
            ctx.restore();
          }
        }
        ctx.restore();
      }

      // ===== country outlines on top =====
      if (s.countries && countriesAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = countriesAlpha;
        // very subtle land fill — slightly lighter than the sphere so countries read as land
        ctx.fillStyle = 'rgba(244,241,234,0.045)';
        ctx.beginPath();
        path({ type: 'FeatureCollection', features: s.countries.features });
        ctx.fill();

        ctx.strokeStyle = 'rgba(244,241,234,0.28)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        path({ type: 'FeatureCollection', features: s.countries.features });
        ctx.stroke();

        // hover outline accent — glowy version of the accent color
        if (hoverIso) {
          const hf = s.countries.features.find(f => f.properties.iso === hoverIso);
          if (hf) {
            ctx.save();
            ctx.shadowColor = `rgba(${aR}, ${aG}, ${aB}, 0.95)`;
            ctx.shadowBlur = 14;
            ctx.strokeStyle = `rgba(${aR}, ${aG}, ${aB}, 1)`;
            ctx.lineWidth = 1.3;
            ctx.beginPath();
            path(hf);
            ctx.stroke();
            // second pass adds extra bloom
            ctx.shadowBlur = 24;
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            path(hf);
            ctx.stroke();
            ctx.restore();
          }
        }

        // visited outline — accent color
        ctx.strokeStyle = fillStyle === 'outline'
          ? `rgba(${aR}, ${aG}, ${aB}, 1)`
          : `rgba(${aR}, ${aG}, ${aB}, 0.85)`;
        ctx.lineWidth = fillStyle === 'outline' ? 1.4 : 0.9;
        for (const f of s.countries.features) {
          if (visitedIsos[f.properties.iso]) {
            ctx.beginPath();
            path(f);
            ctx.stroke();
          }
        }

        // ===== draw cities when zoomed in =====
        // Cities fade out aggressively while the user is interacting with the
        // globe — they obscure countries and make clicks ambiguous. They come
        // back in once the globe is at rest.
        if (s.cities && s.zoom > 1.6) {
          // motion factor: 1 when still, 0 when actively dragging / fast spinning / zooming
          const speed = Math.hypot(s.velocity[0], s.velocity[1]);
          const zoomDelta = s.targetZoom !== null ? Math.abs(s.targetZoom - s.zoom) : 0;
          let motionFactor = 1;
          if (s.isDragging) motionFactor = 0;
          else {
            const speedFade = Math.max(0, 1 - speed / 2.0);   // 0 when speed >= 2
            const zoomFade  = Math.max(0, 1 - zoomDelta / 0.25);
            motionFactor = Math.min(speedFade, zoomFade);
          }

          // visual fades — labels disappear faster than dots so positions stay legible
          const baseFade = Math.min(1, (s.zoom - 1.6) / 0.6);
          const dotAlpha   = baseFade * (0.25 + 0.75 * motionFactor); // dots dim but stay
          const labelAlpha = baseFade * motionFactor;                 // labels gone when interacting

          // collect visible cities first, sorted by importance, then collision-pack labels
          const candidates = [];
          for (const f of s.cities.features) {
            const [lon, lat] = f.geometry.coordinates;
            const props = f.properties || {};
            const rank = props.scalerank != null ? props.scalerank : 5;
            // gate by zoom — more important cities (lower rank) appear sooner
            const minZoomForCity = 1.7 + rank * 0.22;
            if (s.zoom < minZoomForCity) continue;

            // True frontness = dot product with the view direction.
            // 1 at view center, 0 at the rim (any direction), negative on the
            // back hemisphere. (See marker visibility code below for the
            // derivation — same coordinate convention.)
            const lambda = lon * Math.PI / 180;
            const phi = lat * Math.PI / 180;
            const cosPhi = Math.cos(phi);
            const x3 = cosPhi * Math.cos(lambda);
            const y3 = Math.sin(phi);
            const z3 = cosPhi * Math.sin(lambda);
            const rx = -s.rotation[0] * Math.PI / 180;
            const x1 = Math.cos(rx) * x3 + Math.sin(rx) * z3;
            const ry = s.rotation[1] * Math.PI / 180;
            const frontness = x1 * Math.cos(ry) - y3 * Math.sin(ry);
            if (frontness < 0.08) continue;

            const proj = projection([lon, lat]);
            if (!proj) continue;
            candidates.push({ proj, rank, name: props.name || props.NAME || '', edgeFade: Math.min(1, (frontness - 0.08) / 0.18) });
          }
          // sort by importance — lower rank first
          candidates.sort((a, b) => a.rank - b.rank);

          ctx.save();
          // dots first (under labels)
          if (dotAlpha > 0.02) {
            for (const c of candidates) {
              const a = dotAlpha * c.edgeFade;
              ctx.fillStyle = `rgba(244, 241, 234, ${0.8 * a})`;
              ctx.strokeStyle = `rgba(8, 8, 11, ${a})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.arc(c.proj[0], c.proj[1], 1.8, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
            }
          }

          // labels — collision-packed so they don't pile on each other or
          // smother the country beneath
          if (labelAlpha > 0.02) {
            ctx.font = '500 10.5px "Inter", system-ui, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const placed = []; // {x,y,w,h}
            for (const c of candidates) {
              if (!c.name) continue;
              const a = labelAlpha * c.edgeFade;
              if (a < 0.05) continue;
              const tw = ctx.measureText(c.name).width;
              const lx = c.proj[0] + 6;
              const ly = c.proj[1];
              const box = { x: lx - 2, y: ly - 7, w: tw + 6, h: 14 };
              let collides = false;
              for (const p of placed) {
                if (box.x < p.x + p.w && box.x + box.w > p.x &&
                    box.y < p.y + p.h && box.y + box.h > p.y) {
                  collides = true; break;
                }
              }
              if (collides) continue;
              placed.push(box);

              // outline for legibility
              ctx.lineWidth = 3;
              ctx.strokeStyle = `rgba(8, 8, 11, ${0.85 * a})`;
              ctx.strokeText(c.name, lx, ly);
              ctx.fillStyle = `rgba(244, 241, 234, ${0.92 * a})`;
              ctx.fillText(c.name, lx, ly);
            }
            // also reserve the dot disc as an obstacle so the tooltip avoids it
            s.lastCityBoxes = placed.slice();
          }
          ctx.restore();
        }

        // ===== route lines for hovered visited country =====
        if (hoverIso && visitedIsos[hoverIso] && routes[hoverIso] && routes[hoverIso].length > 0) {
          const stops = routes[hoverIso];
          // append the country's centroid as the final destination
          const hf = s.countries.features.find(f => f.properties.iso === hoverIso);
          const centroid = hf ? d3.geoCentroid(hf) : null;
          const coords = stops.map(st => [st.lon, st.lat]);
          if (centroid) coords.push(centroid);

          if (coords.length >= 2) {
            const lineFeature = {
              type: 'Feature',
              geometry: { type: 'LineString', coordinates: coords },
            };
            ctx.save();
            ctx.shadowColor = `rgba(${aR}, ${aG}, ${aB}, 0.95)`;
            ctx.shadowBlur = 12;
            ctx.strokeStyle = `rgba(${aR}, ${aG}, ${aB}, 0.95)`;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 4]);
            ctx.beginPath();
            path(lineFeature);
            ctx.stroke();
            ctx.setLineDash([]);
            // second pass adds bloom
            ctx.shadowBlur = 22;
            ctx.lineWidth = 0.7;
            ctx.beginPath();
            path(lineFeature);
            ctx.stroke();
            ctx.restore();

            // sample the route along the great-circle so tooltip placement can
            // detect intersections with the dashed curve, not just straight-line segments
            const ROUTE_SAMPLES_PER_SEG = 16;
            const sampled = [];
            for (let i = 0; i < coords.length - 1; i++) {
              const interp = d3.geoInterpolate(coords[i], coords[i + 1]);
              const steps = i === 0 ? ROUTE_SAMPLES_PER_SEG + 1 : ROUTE_SAMPLES_PER_SEG;
              for (let j = i === 0 ? 0 : 1; j <= ROUTE_SAMPLES_PER_SEG; j++) {
                const ll = interp(j / ROUTE_SAMPLES_PER_SEG);
                const pt = projection(ll);
                if (pt) sampled.push(pt);
              }
            }
            s.lastRoutePath = sampled;

            // ===== animated airplane along the route =====
            // Only show when the projected path is long enough that the plane
            // sprite is visible and its motion reads as movement for ≥2 seconds.
            // Compute total screen-space length of the projected polyline.
            let screenLen = 0;
            let lastProj = projection(coords[0]);
            for (let i = 1; i < coords.length; i++) {
              const p = projection(coords[i]);
              if (lastProj && p) {
                screenLen += Math.hypot(p[0] - lastProj[0], p[1] - lastProj[1]);
              }
              lastProj = p;
            }
            // airplane sprite is ~17px wide; require ≥120px on-screen
            // and ≥2s visible at 7s period means ≥ (2/7)*total = ~28.5%
            // visible. We approximate by requiring the on-screen length itself
            // to be > 120px (much larger than the sprite) — this guarantees
            // both legibility and a multi-second arc.
            const SHOW_PLANE = screenLen > 120;

            const segLens = [];
            let total = 0;
            for (let i = 0; i < coords.length - 1; i++) {
              const len = d3.geoDistance(coords[i], coords[i + 1]);
              segLens.push(len);
              total += len;
            }
            if (SHOW_PLANE && total > 0) {
              const period = 7000; // ms for one full traversal
              const progress = ((t || performance.now()) % period) / period;
              const target = progress * total;
              // find segment
              let acc = 0, segIdx = 0, localT = 0;
              for (let i = 0; i < segLens.length; i++) {
                if (acc + segLens[i] >= target) {
                  segIdx = i;
                  localT = (target - acc) / segLens[i];
                  break;
                }
                acc += segLens[i];
              }
              const interp = d3.geoInterpolate(coords[segIdx], coords[segIdx + 1]);
              const curLL = interp(localT);
              // a point slightly ahead for heading
              const aheadT = Math.min(1, localT + 0.04);
              const aheadLL = interp(aheadT);
              const p1 = projection(curLL);
              const p2 = projection(aheadLL);
              if (p1 && p2) {
                const heading = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
                ctx.save();
                ctx.translate(p1[0], p1[1]);
                // sprite points "east" (+x) by default — rotate so nose follows heading
                ctx.rotate(heading);
                ctx.shadowColor = `rgba(${aR}, ${aG}, ${aB}, 1)`;
                ctx.shadowBlur = 10;
                ctx.fillStyle = `rgba(${aR}, ${aG}, ${aB}, 1)`;
                // airplane silhouette — nose at (+x), wings perpendicular
                ctx.beginPath();
                ctx.moveTo(9, 0);                   // nose tip
                ctx.lineTo(2, -1.6);                // top of fuselage by nose
                ctx.lineTo(1, -1.6);                // wing root top
                ctx.lineTo(-2, -7);                 // wing tip (top)
                ctx.lineTo(-4, -7);
                ctx.lineTo(-2.5, -1.6);             // back to wing root
                ctx.lineTo(-5, -1.6);               // fuselage continuing back
                ctx.lineTo(-6, -4);                 // tail top
                ctx.lineTo(-7, -4);
                ctx.lineTo(-7.5, -1.4);             // back of tail top
                ctx.lineTo(-7.5, 1.4);              // back of tail bottom
                ctx.lineTo(-7, 4);
                ctx.lineTo(-6, 4);                  // tail bottom
                ctx.lineTo(-5, 1.6);                // fuselage continuing back (bottom)
                ctx.lineTo(-2.5, 1.6);              // wing root bottom
                ctx.lineTo(-4, 7);                  // wing tip (bottom)
                ctx.lineTo(-2, 7);
                ctx.lineTo(1, 1.6);                 // wing root bottom near nose
                ctx.lineTo(2, 1.6);                 // bottom of fuselage by nose
                ctx.closePath();
                ctx.fill();
                ctx.restore();
              }
            }
          }
          // draw stop markers — numbered for stops, ★ for the destination
          for (let i = 0; i < stops.length; i++) {
            const stop = stops[i];
            const proj = projection([stop.lon, stop.lat]);
            if (!proj) continue;
            ctx.save();
            ctx.shadowColor = `rgba(${aR}, ${aG}, ${aB}, 0.9)`;
            ctx.shadowBlur = 10;
            ctx.strokeStyle = `rgba(${aR}, ${aG}, ${aB}, 1)`;
            ctx.lineWidth = 1.6;
            ctx.fillStyle = '#07070a';
            ctx.beginPath();
            ctx.arc(proj[0], proj[1], 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = `rgba(${aR}, ${aG}, ${aB}, 1)`;
            ctx.beginPath();
            ctx.arc(proj[0], proj[1], 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.font = '600 9px "JetBrains Mono", monospace';
            ctx.fillStyle = `rgba(${aR}, ${aG}, ${aB}, 1)`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(i + 1), proj[0] + 9, proj[1] - 1);
            ctx.restore();
          }
          // draw destination marker (country centroid) — slightly larger pulse
          if (centroid) {
            const proj = projection(centroid);
            if (proj) {
              s.lastDestinationPoint = proj;
              ctx.save();
              ctx.shadowColor = `rgba(${aR}, ${aG}, ${aB}, 1)`;
              ctx.shadowBlur = 16;
              ctx.fillStyle = `rgba(${aR}, ${aG}, ${aB}, 1)`;
              ctx.beginPath();
              ctx.arc(proj[0], proj[1], 4, 0, Math.PI * 2);
              ctx.fill();
              ctx.shadowBlur = 26;
              ctx.beginPath();
              ctx.arc(proj[0], proj[1], 2.5, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
          }
        }
        ctx.restore();
      }

      // ===== photo markers — Instagram-style cards anchored to country centroids =====
      // Markers always sit at their country's centroid and ALWAYS render
       // (when the country is in view). Size scales with globe radius so they
       // stay legible without crowding each other at low zoom.
      const markersList = photoMarkersRef.current || [];
      if (markersList.length > 0) {
        // Aggressive scaling: at low zoom (small radius) markers shrink to
        // pinpoint size; at high zoom they grow up to ~1.5x base.
        // radius range: ~290 (zoom 1.3) → ~1300 (zoom 6)
        const sizeFactor = Math.max(0.45, Math.min(1.4, radius / 360));
        const W = Math.max(11, Math.round(19 * sizeFactor));
        const H = Math.max(14, Math.round(25 * sizeFactor));
        const TIP = Math.max(2, Math.round(3 * sizeFactor));

        if (!s.markerLastSize) s.markerLastSize = 0;
        const sizeChanged = Math.abs(s.markerLastSize - W) > 0;
        if (sizeChanged) s.markerLastSize = W;

        // collect visible markers — back-of-sphere + centroid-on-canvas check.
        // We tolerate the marker box itself extending past a canvas edge
        // (browser/parent clip handles partial bleed) so markers don't blink
        // out when their country is still clearly visible near the top.
        const visible = [];
        for (const m of markersList) {
          const el = markerRefs.current[m.iso];
          if (!el) continue;
          // 3D position in marker convention: X = lon0 equator (forward),
          // Y = north pole (up), Z = lon90 equator (right).
          const lambda = m.lon * Math.PI / 180;
          const phi = m.lat * Math.PI / 180;
          const cosPhi = Math.cos(phi);
          const x3 = cosPhi * Math.cos(lambda);
          const y3 = Math.sin(phi);
          const z3 = cosPhi * Math.sin(lambda);
          // Apply d3's lambda shift: rotation around the Y (up) axis by
          // -rotation[0]. After this, x1 is the new "forward" component.
          const rx = -s.rotation[0] * Math.PI / 180;
          const x1 = Math.cos(rx) * x3 + Math.sin(rx) * z3;
          // Apply d3's phi tilt: rotation around the Z (right) axis by
          // rotation[1]. Frontness = projection of the rotated point onto the
          // view (forward) axis. This is the actual dot-product with the view
          // direction — 1 at view center, 0 at the rim (any direction), and
          // negative on the back hemisphere.
          const ry = s.rotation[1] * Math.PI / 180;
          const frontness = x1 * Math.cos(ry) - y3 * Math.sin(ry);
          const proj = projection([m.lon, m.lat]);
          // Show across the entire FRONT hemisphere (left rim → center →
          // right rim, AND top rim → bottom rim) and hide only once the
          // country rotates around to the back. Small positive cushion so
          // markers don't flicker exactly at the limb where projection is
          // degenerate.
          if (!proj || frontness < 0.03 || isLanding) {
            if (el.style.opacity !== '0') el.style.opacity = '0';
            continue;
          }
          visible.push({ m, el, proj, frontness });
        }
        // stable order by iso so layering is deterministic frame to frame
        visible.sort((a, b) => a.m.iso < b.m.iso ? -1 : 1);

        for (let i = 0; i < visible.length; i++) {
          const v = visible[i];
          if (sizeChanged) {
            v.el.style.width = `${W}px`;
            v.el.style.height = `${H}px`;
          }
          // Anchor centered above the centroid (pin tip at the centroid).
          // No auto-flipping or edge-nudging — partial bleed past the canvas
          // edge is allowed so the marker stays pinned to its true location.
          const x = v.proj[0] - W / 2;
          const y = v.proj[1] - H - TIP;

          // Fade-in band: from the rim (frontness=0.03) over the next ~0.18,
          // so markers softly appear as their country emerges from the back.
          const edge = Math.min(1, (v.frontness - 0.03) / 0.18);
          v.el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
          v.el.style.zIndex = String(100 + i);
          const op = String(0.7 + 0.3 * edge);
          if (v.el.style.opacity !== op) v.el.style.opacity = op;
        }
      }

      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, [visited, routes, tweaks.autoSpin, tweaks.fillStyle, tweaks.visitedColor, tweaks.sphereStyle]);

  // ===== smart tooltip placement =====
  // Try several positions around the pointer and pick the one that overlaps
  // the fewest on-canvas things: city labels, the route polyline, the
  // destination dot, and the country centroid. Also prefer to stay on-screen.
  const TOOLTIP_W = 220;
  const TOOLTIP_H = 34;
  const TOOLTIP_OFFSET = 16;

  const rectsIntersect = (a, b) =>
    a[0] < b[0] + b[2] && a[0] + a[2] > b[0] &&
    a[1] < b[1] + b[3] && a[1] + a[3] > b[1];
  const pointInRect = (p, r) =>
    p[0] >= r[0] && p[0] <= r[0] + r[2] &&
    p[1] >= r[1] && p[1] <= r[1] + r[3];

  const computeTooltipPlacement = (p, iso) => {
    const s = stateRef.current;
    const [px, py] = p;
    const W = TOOLTIP_W, H = TOOLTIP_H, OFF = TOOLTIP_OFFSET;

    // candidate anchor rects in screen space
    const candidates = [
      { name: 'top',    rect: [px - W / 2,  py - OFF - H, W, H] },
      { name: 'bottom', rect: [px - W / 2,  py + OFF,     W, H] },
      { name: 'right',  rect: [px + OFF,    py - H / 2,   W, H] },
      { name: 'left',   rect: [px - OFF - W, py - H / 2,  W, H] },
    ];

    // collect obstacles for current frame
    const obstacles = {
      rects: (s.lastCityBoxes || []).map(b => [b.x - 2, b.y - 2, b.w + 4, b.h + 4]),
      route: s.lastRoutePath || null,
      points: [],
    };
    if (s.lastDestinationPoint) obstacles.points.push(s.lastDestinationPoint);
    // also avoid the country centroid for the hovered country so the tooltip
    // doesn't sit on top of its label / centroid marker
    if (iso && s.countries) {
      const f = s.countries.features.find(ff => ff.properties.iso === iso);
      if (f) {
        const size = Math.min(s.width, s.height);
        const radius = size * 0.36 * s.zoom;
        const proj = d3.geoOrthographic()
          .scale(radius)
          .translate([s.width / 2, s.height / 2 + (s.verticalOffsetPx || 0)])
          .rotate(s.rotation)
          .clipAngle(90);
        const c = d3.geoCentroid(f);
        const cp = proj(c);
        if (cp) obstacles.points.push(cp);
      }
    }

    let best = candidates[0];
    let bestScore = Infinity;
    for (const cand of candidates) {
      const r = cand.rect;
      let score = 0;
      // off-screen penalty (large, but not infinite so we still pick least-bad)
      const margin = 8;
      if (r[0] < margin) score += (margin - r[0]) * 4 + 200;
      if (r[1] < margin) score += (margin - r[1]) * 4 + 200;
      if (r[0] + r[2] > s.width - margin) score += (r[0] + r[2] - (s.width - margin)) * 4 + 200;
      if (r[1] + r[3] > s.height - margin) score += (r[1] + r[3] - (s.height - margin)) * 4 + 200;
      // city-label rect intersections — heavy penalty per hit
      for (const o of obstacles.rects) {
        if (rectsIntersect(r, o)) score += 120;
      }
      // route polyline — count sampled points falling inside the tooltip rect
      if (obstacles.route) {
        for (const pt of obstacles.route) {
          if (pointInRect(pt, r)) score += 12;
        }
      }
      // destination + country centroid points
      for (const pt of obstacles.points) {
        if (pointInRect(pt, r)) score += 200;
      }
      // slight preference for top placement to feel natural
      if (cand.name === 'top') score -= 1;
      if (score < bestScore) {
        bestScore = score;
        best = cand;
      }
    }
    return best.name;
  };

  // ===== pointer events =====
  const getPointer = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const isTouch = e.touches && e.touches[0];
    const x = (isTouch ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (isTouch ? e.touches[0].clientY : e.clientY) - rect.top;
    return [x, y];
  };

  const handleDown = (e) => {
    const s = stateRef.current;
    s.isDragging = true;
    s.autoSpin = false;
    s.targetRotation = null;
    s.lastPointer = getPointer(e);
    s.dragStartTime = performance.now();
    s.dragStartPos = s.lastPointer.slice();
    canvasRef.current.classList.add('dragging');
  };

  const handleMove = (e) => {
    const s = stateRef.current;
    const p = getPointer(e);

    if (s.isDragging) {
      const [px, py] = s.lastPointer;
      const dx = p[0] - px;
      const dy = p[1] - py;
      s.rotation[0] += dx * 0.35;
      s.rotation[1] -= dy * 0.35;
      s.rotation[1] = Math.max(-80, Math.min(80, s.rotation[1]));
      s.velocity[0] = dx * 0.35;
      s.velocity[1] = -dy * 0.35;
      s.lastPointer = p;
      setTooltipPos(null);
      setHoverCountry(null);
      s.hoverIso = null;
    } else {
      // hover detection
      const iso = pickCountry(p);
      if (iso !== s.hoverIso) {
        s.hoverIso = iso;
        if (iso && s.countries) {
          const country = s.countries.features.find(f => f.properties.iso === iso);
          setHoverCountry(country ? { iso, name: country.properties.name } : null);
        } else {
          setHoverCountry(null);
        }
        onHoverChange && onHoverChange(iso);
      }
      if (iso) {
        const placement = computeTooltipPlacement(p, iso);
        setTooltipPos({ x: p[0], y: p[1], placement });
        canvasRef.current.classList.add('hovering');
      } else {
        setTooltipPos(null);
        canvasRef.current.classList.remove('hovering');
      }
    }
  };

  // wheel zoom — attached as non-passive native listener
  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const onWheel = (e) => {
      e.preventDefault();
      const s = stateRef.current;
      const dir = e.deltaY < 0 ? 1 : -1;
      const factor = Math.exp(dir * 0.12);
      const next = Math.max(1.3, Math.min(6, s.zoom * factor));
      s.targetZoom = next;
      s.autoSpin = false;
      // hide hover state while wheeling
      setTooltipPos(null);
      setHoverCountry(null);
      s.hoverIso = null;
    };
    c.addEventListener('wheel', onWheel, { passive: false });
    return () => c.removeEventListener('wheel', onWheel);
  }, []);

  const handleUp = (e) => {
    const s = stateRef.current;
    const wasDragging = s.isDragging;
    s.isDragging = false;
    canvasRef.current.classList.remove('dragging');

    // detect click (short, low-movement)
    if (wasDragging && s.dragStartPos && s.dragStartTime) {
      const dt = performance.now() - s.dragStartTime;
      const p = s.lastPointer;
      const dist = Math.hypot(p[0] - s.dragStartPos[0], p[1] - s.dragStartPos[1]);
      if (dt < 300 && dist < 5) {
        const iso = pickCountry(p);
        if (iso) {
          onCountryClick && onCountryClick(iso);
        }
      }
    }
  };

  const pickCountry = (p) => {
    const s = stateRef.current;
    if (!s.countries) return null;
    const w = s.width, h = s.height;
    const size = Math.min(w, h);
    const radius = size * 0.36 * s.zoom;
    const cx = w / 2, cy = h / 2 + (s.verticalOffsetPx || 0);
    if (Math.hypot(p[0] - cx, p[1] - cy) > radius) return null;
    const projection = d3.geoOrthographic()
      .scale(radius)
      .translate([cx, cy])
      .rotate(s.rotation)
      .clipAngle(90);
    const coord = projection.invert(p);
    if (!coord) return null;
    for (const f of s.countries.features) {
      if (d3.geoContains(f, coord)) return f.properties.iso;
    }
    return null;
  };

  return (
    <div ref={containerRef} style={{ position: 'absolute', inset: 0 }}>
      <canvas
        id="globe"
        ref={canvasRef}
        onMouseDown={handleDown}
        onMouseMove={handleMove}
        onMouseUp={handleUp}
        onMouseLeave={handleUp}
        onTouchStart={handleDown}
        onTouchMove={(e) => { e.preventDefault(); handleMove(e); }}
        onTouchEnd={handleUp}
      />
      {/* photo markers — positions are mutated each frame in the render loop */}
      <div className="photo-markers" style={{ '--marker-badge': tweaks.visitedColor || '#f5c542', '--marker-border': tweaks.visitedColor || '#f5c542' }}>
        {photoMarkers.map(m => (
          <div
            key={m.iso}
            ref={el => {
              if (el) markerRefs.current[m.iso] = el;
              else delete markerRefs.current[m.iso];
            }}
            className="photo-marker"
            title={m.name}
            onClick={(e) => { e.stopPropagation(); onCountryClick && onCountryClick(m.iso); }}
          >
            <img src={m.photo} className="photo-marker-img" alt="" draggable={false} />
            {m.count > 1 && <span className="photo-marker-badge">{m.count}</span>}
          </div>
        ))}
      </div>
      {!loaded && (
        <div className="loading">
          <div className="spinner"></div>
          <div>Charting the world</div>
        </div>
      )}
      {hoverCountry && tooltipPos && (() => {
        const placement = tooltipPos.placement || 'top';
        const transforms = {
          top:    `translate(-50%, calc(-100% - ${TOOLTIP_OFFSET}px))`,
          bottom: `translate(-50%, ${TOOLTIP_OFFSET}px)`,
          right:  `translate(${TOOLTIP_OFFSET}px, -50%)`,
          left:   `translate(calc(-100% - ${TOOLTIP_OFFSET}px), -50%)`,
        };
        return (
          <div
            className="country-label"
            data-placement={placement}
            style={{ left: tooltipPos.x, top: tooltipPos.y, transform: transforms[placement] }}
          >
            {visited[hoverCountry.iso] && <span className="vmark" style={{ background: tweaks.visitedColor || '#f5c542' }}></span>}
            <span className="name">{hoverCountry.name}</span>
            <span className="iso" style={visited[hoverCountry.iso] ? { color: tweaks.visitedColor || '#f5c542' } : undefined}>
              {visited[hoverCountry.iso] ? 'VISITED' : 'TAP TO ADD'}
            </span>
          </div>
        );
      })()}
    </div>
  );
});

window.Globe = Globe;

</script>
<script type="text/babel" data-from="modal.jsx">
/* global React */
const { useState, useEffect, useRef, useMemo } = React;

function MusicSearch({ accent, onPick }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    if (!q.trim()) { setResults([]); setSearching(false); return; }
    const ctrl = new AbortController();
    setSearching(true);
    const t = setTimeout(async () => {
      try {
        const out = await searchMusic(q);
        if (!ctrl.signal.aborted) setResults(out.filter(r => r.previewUrl));
      } catch (e) { if (e.name !== 'AbortError') console.warn(e); }
      finally { if (!ctrl.signal.aborted) setSearching(false); }
    }, 280);
    return () => { clearTimeout(t); ctrl.abort(); };
  }, [q]);

  return (
    <div className="music-search">
      <div className="music-search-input">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20 L16 16" />
        </svg>
        <input
          value={q}
          onChange={e => setQ(e.target.value)}
          onFocus={() => setOpen(true)}
          onBlur={() => setTimeout(() => setOpen(false), 150)}
          placeholder=""
        />
        {searching && <div className="music-spinner"></div>}
      </div>
      {open && results.length > 0 && (
        <div className="music-results">
          {results.map(r => (
            <button
              key={r.trackId}
              type="button"
              className="music-result"
              onMouseDown={(e) => { e.preventDefault(); onPick(r); }}
            >
              <img src={r.artworkUrlSmall} alt="" />
              <div className="music-result-info">
                <div className="music-result-name">{r.trackName}</div>
                <div className="music-result-artist">{r.artistName}</div>
              </div>
              <span className="music-result-preview" style={{ color: accent }}>30s preview</span>
            </button>
          ))}
        </div>
      )}
      {q.trim() && !searching && open && results.length === 0 && (
        <div className="music-empty">No tracks with a previewable clip — try a different search.</div>
      )}
    </div>
  );
}

// ─── helpers ─────────────────────────────────────────────────────────────────

function CitySearch({ accent, onPick }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [open, setOpen] = useState(false);
  const [active, setActive] = useState(0);

  useEffect(() => {
    if (q.trim().length < 2) { setResults([]); setSearching(false); return; }
    const ctrl = new AbortController();
    setSearching(true);
    const t = setTimeout(async () => {
      try {
        const out = await geocodePlaces(q);
        if (!ctrl.signal.aborted) { setResults(out); setActive(0); }
      } catch (e) { if (e.name !== 'AbortError') console.warn(e); }
      finally { if (!ctrl.signal.aborted) setSearching(false); }
    }, 280);
    return () => { clearTimeout(t); ctrl.abort(); };
  }, [q]);

  const pick = (r) => {
    onPick({ ...r, input: q });
    setQ(''); setResults([]); setOpen(false);
  };

  const onKey = (e) => {
    if (!open || results.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(a => (a + 1) % results.length); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActive(a => (a - 1 + results.length) % results.length); }
    if (e.key === 'Enter')     { e.preventDefault(); pick(results[active]); }
    if (e.key === 'Escape')    { setOpen(false); }
  };

  return (
    <div className="music-search">
      <div className="music-search-input">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20 L16 16" />
        </svg>
        <input
          value={q}
          onChange={e => setQ(e.target.value)}
          onFocus={() => setOpen(true)}
          onBlur={() => setTimeout(() => setOpen(false), 150)}
          onKeyDown={onKey}
          placeholder=""
        />
        {searching && <div className="music-spinner"></div>}
      </div>
      {open && results.length > 0 && (
        <div className="music-results">
          {results.map((r, i) => (
            <button
              key={`${r.lat}-${r.lon}-${i}`}
              type="button"
              className={`music-result ${i === active ? 'is-active' : ''}`}
              style={i === active ? { background: 'rgba(244,241,234,0.06)' } : undefined}
              onMouseDown={(e) => { e.preventDefault(); pick(r); }}
              onMouseEnter={() => setActive(i)}
            >
              <div className="music-result-info">
                <div className="music-result-name">{r.primary}</div>
                {r.secondary && <div className="music-result-artist">{r.secondary}</div>}
              </div>
            </button>
          ))}
        </div>
      )}
      {q.trim().length >= 2 && !searching && open && results.length === 0 && (
        <div className="music-empty">No matches — try a different name.</div>
      )}
    </div>
  );
}

async function geocodePlace(query) {
  const results = await geocodePlaces(query, 1);
  return results[0] || null;
}

async function geocodePlaces(query, limit = 6) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=${limit}&q=${encodeURIComponent(query)}`;
  try {
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const json = await resp.json();
    return (json || []).map(r => {
      const parts = (r.display_name || '').split(',').map(s => s.trim());
      const primary = parts[0] || r.name || '';
      const secondary = parts.slice(1, 3).join(', ');
      return {
        name: parts.slice(0, 2).join(', ').trim(),
        primary,
        secondary,
        lat: parseFloat(r.lat),
        lon: parseFloat(r.lon),
        type: r.type,
        class: r.class,
      };
    });
  } catch (e) { console.warn('geocode failed', e); }
  return [];
}

async function searchMusic(query) {
  const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=8`;
  const resp = await fetch(url);
  const json = await resp.json();
  return (json.results || []).map(r => ({
    trackId: r.trackId,
    trackName: r.trackName,
    artistName: r.artistName,
    artworkUrl: (r.artworkUrl100 || '').replace('100x100', '300x300'),
    artworkUrlSmall: r.artworkUrl100,
    previewUrl: r.previewUrl,
    durationMs: r.trackTimeMillis,
  }));
}

async function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function fmtBytes(n) {
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(0)} KB`;
  return `${(n / 1024 / 1024).toFixed(1)} MB`;
}

// Hook: HTML5 <audio> player wrapper.
function useAudioFile(src) {
  const audioRef = useRef(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!src) { setReady(false); setIsPlaying(false); return; }
    const audio = new Audio();
    audioRef.current = audio;
    const onCanPlay = () => setReady(true);
    const onPlay = () => setIsPlaying(true);
    const onPause = () => setIsPlaying(false);
    const onEnded = () => setIsPlaying(false);
    audio.addEventListener('canplay', onCanPlay);
    audio.addEventListener('play', onPlay);
    audio.addEventListener('pause', onPause);
    audio.addEventListener('ended', onEnded);
    audio.src = src;
    // try to autoplay; will succeed because modal-open click counts as user gesture
    audio.play().catch(() => {});
    return () => {
      try {
        audio.pause();
        audio.muted = true;
        audio.src = '';
        audio.load();
      } catch (e) {}
      audio.removeEventListener('canplay', onCanPlay);
      audio.removeEventListener('play', onPlay);
      audio.removeEventListener('pause', onPause);
      audio.removeEventListener('ended', onEnded);
      audioRef.current = null;
      setReady(false);
      setIsPlaying(false);
    };
  }, [src]);

  const toggle = () => {
    const a = audioRef.current;
    if (!a) return;
    if (a.paused) a.play().catch(() => {});
    else a.pause();
  };

  return { ready, isPlaying, toggle };
}

async function compressImage(file, maxDim = 1400, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = (height / width) * maxDim; width = maxDim; }
        else if (height > maxDim) { width = (width / height) * maxDim; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fmtDate(s) {
  if (!s) return null;
  return new Date(s).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtRange(from, to) {
  if (!from && !to) return null;
  if (from && to && from !== to) return `${fmtDate(from)} → ${fmtDate(to)}`;
  return fmtDate(from || to);
}

function hexToGlow(accent) {
  const h = (accent || '#f5c542').replace('#', '');
  const v = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
  const n = parseInt(v, 16);
  return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, 0.22)`;
}

// ─── EDIT MODE: full form ────────────────────────────────────────────────────

function EditMode({ country, entry, accent, glow, onClose, onSave, onDelete, onCancelToView }) {
  const [dateFrom, setDateFrom] = useState(entry?.dateFrom || '');
  const [dateTo, setDateTo] = useState(entry?.dateTo || '');
  const [notes, setNotes] = useState(entry?.notes || '');
  const [song, setSong] = useState(entry?.song && entry.song.previewUrl ? entry.song : null);
  const [photos, setPhotos] = useState(entry?.photos || []);
  const [stops, setStops] = useState(entry?.stops || []);
  const [stopInput, setStopInput] = useState('');
  const [geocoding, setGeocoding] = useState(false);
  const [stopError, setStopError] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const handleFiles = async (files) => {
    setUploading(true);
    try {
      const out = [];
      for (const f of files) {
        if (!f.type.startsWith('image/')) continue;
        const dataUrl = await compressImage(f);
        out.push({ id: Math.random().toString(36).slice(2), src: dataUrl, name: f.name });
      }
      setPhotos(p => [...p, ...out]);
    } finally { setUploading(false); }
  };
  const onFileInput = (e) => { handleFiles(Array.from(e.target.files || [])); e.target.value = ''; };
  const onDrop = (e) => { e.preventDefault(); setDragging(false); handleFiles(Array.from(e.dataTransfer.files || [])); };
  const removePhoto = (id) => setPhotos(p => p.filter(x => x.id !== id));

  const handleSave = () => {
    onSave({
      dateFrom, dateTo,
      notes: notes.trim(),
      song,
      photos,
      stops,
      visited: true,
      updated: Date.now(),
    });
  };

  const addStop = async () => {
    const q = stopInput.trim();
    if (!q) return;
    setGeocoding(true); setStopError(null);
    const result = await geocodePlace(q);
    setGeocoding(false);
    if (result) { setStops(s => [...s, { ...result, input: q }]); setStopInput(''); }
    else setStopError(`Couldn\u2019t find "${q}". Try a more specific name.`);
  };
  const removeStop = (idx) => setStops(s => s.filter((_, i) => i !== idx));
  const moveStop = (idx, dir) => {
    setStops(s => {
      const next = s.slice();
      const target = idx + dir;
      if (target < 0 || target >= next.length) return s;
      [next[idx], next[target]] = [next[target], next[idx]];
      return next;
    });
  };

  const backdropClick = (e) => { if (e.target === e.currentTarget) onClose(); };

  return (
    <div className="modal-backdrop" onMouseDown={backdropClick}>
      <div className="modal" onMouseDown={(e) => e.stopPropagation()} style={{ '--modal-glow': glow }}>
        <div className="modal-head">
          <div className="titles">
            <h2 className="modal-title">{country.name}</h2>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Close">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 2 L10 10 M10 2 L2 10" stroke="currentColor" strokeWidth="1.2" />
            </svg>
          </button>
        </div>
        <div className="modal-body">
          <div className="form-col">
            <div className="field-row">
              <div className="field">
                <label>From</label>
                <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
              </div>
              <div className="field">
                <label>To</label>
                <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} />
              </div>
            </div>
            <div className="field">
              <label>Highlight of the trip</label>
              <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={4} />
            </div>

            <div className="field">
              <label>Song of the trip</label>
              {song ? (
                <div className="song-row">
                  {song.artworkUrl && <img src={song.artworkUrl} className="song-row-art" alt="" />}
                  <div className="song-row-info">
                    <div className="song-row-name">{song.trackName}</div>
                    <div className="song-row-meta">{song.artistName}</div>
                  </div>
                  <button type="button" className="song-row-remove" onClick={() => setSong(null)} aria-label="Remove song">×</button>
                </div>
              ) : (
                <MusicSearch accent={accent} onPick={setSong} />
              )}
            </div>

            <div className="field itinerary">
              <label>Departure city</label>
              {stops.length > 0 ? (
                <div className="stops-list">
                  <div className="stop-chip">
                    <span className="stop-idx" style={{ background: accent, color: '#07070a' }}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21 C12 21 5 14 5 9 A7 7 0 0 1 19 9 C19 14 12 21 12 21 Z"/><circle cx="12" cy="9" r="2.5"/></svg>
                    </span>
                    <span className="stop-name">{stops[0].name}</span>
                    <div className="stop-actions">
                      <button type="button" onClick={() => removeStop(0)} aria-label="Remove">×</button>
                    </div>
                  </div>
                </div>
              ) : (
                <CitySearch
                  accent={accent}
                  onPick={(place) => { setStops([place]); setStopError(null); }}
                />
              )}
            </div>
          </div>

          <div className="photos-section">
            <div className="label">
              <span>Photos · {photos.length}</span>
              {uploading && <span style={{ color: 'var(--ink-dim)' }}>Compressing…</span>}
            </div>
            <div
              className="photo-grid"
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={onDrop}
            >
              {photos.map(p => (
                <div key={p.id} className="photo">
                  <img src={p.src} alt={p.name} />
                  <button className="remove" onClick={(e) => { e.stopPropagation(); removePhoto(p.id); }} aria-label="Remove">×</button>
                </div>
              ))}
              <div
                className={`photo-drop ${dragging ? 'dragging' : ''}`}
                onClick={() => fileInputRef.current?.click()}
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.3">
                  <path d="M12 5 V19 M5 12 H19" strokeLinecap="round"/>
                </svg>
                <span>Add</span>
              </div>
            </div>
            <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={onFileInput} />
          </div>
        </div>
        <div className="modal-foot">
          <div>
            {entry && (
              <button className="btn ghost-danger" onClick={() => {
                if (window.confirm(`Remove ${country.name} from your map?`)) onDelete();
              }}>
                Remove entry
              </button>
            )}
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn" onClick={entry ? onCancelToView : onClose}>Cancel</button>
            <button className="btn primary" style={{ background: accent, borderColor: accent, color: '#07070a' }} onClick={handleSave}>
              {entry ? 'Save changes' : 'Mark as visited'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── wrapper: switches between view/edit ─────────────────────────────────────

function CountryModal({ country, entry, onClose, onSave, onDelete, accent = '#f5c542', viewLayout = 'sidebar', readOnly = false }) {
  const [mode, setMode] = useState(entry && !readOnly ? 'view' : (readOnly ? 'view' : 'edit'));
  const glow = useMemo(() => hexToGlow(accent), [accent]);

  if (readOnly && !entry) {
    // shouldn't happen — viewer mode prevents the modal from opening for unvisited countries
    return null;
  }

  if (mode === 'view' && entry) {
    return (
      <ViewMode
        country={country}
        entry={entry}
        accent={accent}
        glow={glow}
        layout={viewLayout}
        readOnly={readOnly}
        onClose={onClose}
        onEdit={readOnly ? null : () => setMode('edit')}
      />
    );
  }
  return (
    <EditMode
      country={country}
      entry={entry}
      accent={accent}
      glow={glow}
      onClose={onClose}
      onSave={onSave}
      onDelete={onDelete}
      onCancelToView={() => setMode('view')}
    />
  );
}

window.CountryModal = CountryModal;

<script type="text/babel" data-from="app.jsx">
/* global React, ReactDOM, Globe, CountryModal, TweaksPanel, useTweaks, TweakSection, TweakSlider, TweakToggle, TweakSelect, TweakButton, TweakRadio, TweakColor */

// Read URL params for sharing.

    const u = new URL(window.location.href);

  } catch { return null; }
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

// When this file is a *published* copy, the publisher's data + chosen visuals

// nothing is written back to the viewer's localStorage.
const PUBLISHED = (typeof window !== 'undefined' && window.__ATLAS_PUBLISHED__) || null;

  Object.assign(TWEAK_DEFAULTS, PUBLISHED.tweaks);
}

function loadEntries() {
  if (PUBLISHED && PUBLISHED.entries) return PUBLISHED.entries;
