<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>My Travel Globe</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px; z-index: 5; pointer-events: none; }
  header .title { font-size: 16px; font-weight: 500; letter-spacing: .3px; }
  header .spacer { flex: 1; }
  header .stat { font-size: 13px; color: #777; pointer-events: auto; }
  header label { font-size: 13px; color: #777; pointer-events: auto; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  #stage { flex: 1; position: relative; }
  canvas { display: block; cursor: grab; touch-action: none; }
  canvas:active { cursor: grabbing; }
  #hint { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%); font-size: 12.5px; color: #555; pointer-events: none; transition: opacity .4s; }
  #tooltip { position: absolute; padding: 4px 9px; font-size: 12.5px; color: #fff; background: rgba(0,0,0,.8); border: .5px solid #333; border-radius: 6px; pointer-events: none; transform: translate(-50%,-150%); opacity: 0; transition: opacity .12s; white-space: nowrap; z-index: 6; }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 10; }
  .overlay.open { display: flex; }
  .modal { background: #0c0c0c; border: .5px solid #2a2a2a; border-radius: 14px; width: 380px; max-width: 90vw; max-height: 86vh; overflow: auto; padding: 20px; }
  .modal h2 { font-size: 18px; font-weight: 500; }
  .modal .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .closeBtn { background: transparent; border: .5px solid #333; color: #aaa; border-radius: 8px; padding: 5px 9px; cursor: pointer; font-size: 14px; }
  .closeBtn:hover { background: #1a1a1a; }
  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 14px 0; }
  .grid .ph { aspect-ratio: 1; border-radius: 8px; background: #1a1a1a; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
  .grid .ph img { width: 100%; height: 100%; object-fit: cover; }
  .empty { font-size: 13.5px; color: #888; margin: 6px 0 16px; line-height: 1.6; }
  .addBtn { width: 100%; background: #fff; border: none; color: #000; font-weight: 600; padding: 11px; border-radius: 9px; cursor: pointer; font-size: 14px; }
  .addBtn:hover { background: #ddd; }
  .addBtn:disabled { background: #444; color: #888; cursor: wait; }
  .status { font-size: 12px; color: #888; margin-top: 8px; min-height: 16px; text-align: center; }
  #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; z-index: 4; text-align: center; padding: 0 20px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="title">My Travel Globe</span>
    <span class="spacer"></span>
    <label><input type="checkbox" id="spin" checked> auto-spin</label>
    <span class="stat"><span id="count">0</span> countries visited</span>
  </header>
  <div id="stage">
    <div id="loader">Loading the world&hellip;</div>
    <div id="tooltip"></div>
    <div id="hint">drag to rotate &middot; scroll to zoom &middot; click a country</div>
  </div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo@3.1.0/dist/d3-geo.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ---- Supabase setup ----
const SUPABASE_URL = 'https://vcgugbclnkezvmxvltkf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjZ3VnYmNsbmtlenZteHZsdGtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzIxMTksImV4cCI6MjA5NjcwODExOX0.4sdUM1_R3phFOr2fkpSoLUhHkPIoZr_e7pgc2hDcW00';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ---- Globe constants ----
const SPIN_SPEED = 0.0008;
const DOT_SIZE = 0.013;
const DIM = 0.42;
const BRIGHT = 1.0;
const SAMPLE_STEP = 1.05;

// ---- State ----
// trips: { [countryName]: { id, photos: [{ id, storage_path, url }] } }
const trips = {};
const stage = document.getElementById('stage');
const overlay = document.getElementById('overlay');
const modalEl = document.getElementById('modal');
const tooltip = document.getElementById('tooltip');
const spinChk = document.getElementById('spin');
const hint = document.getElementById('hint');

let W = stage.clientWidth, H = stage.clientHeight;
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(40, W/H, 0.1, 100);
cam.position.z = 3.0;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
stage.appendChild(renderer.domElement);
const canvas = renderer.domElement;

const globe = new THREE.Group();
scene.add(globe);
globe.add(new THREE.Mesh(new THREE.SphereGeometry(0.985, 48, 48), new THREE.MeshBasicMaterial({ color: 0x000000 })));

const halo = new THREE.Mesh(new THREE.SphereGeometry(1.16, 48, 48), new THREE.ShaderMaterial({
  transparent: true, side: THREE.BackSide, depthWrite: false,
  vertexShader: 'varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader: 'varying vec3 vN; void main(){ float i=pow(0.62-dot(vN,vec3(0.0,0.0,1.0)),3.0); gl_FragColor=vec4(1.0,1.0,1.0,1.0)*i*0.85;}'
}));
scene.add(halo);

function toVec(lon, lat, r) {
  const phi = (90-lat)*Math.PI/180, th = (lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(th));
}

let geoFeatures = [];
let dotGeo = null;
const dotCountry = [];

async function build() {
  const resp = await fetch('countries.json');
  if (!resp.ok) throw new Error('Could not load countries.json (HTTP ' + resp.status + ')');
  const topo = await resp.json();
  const geo = topojson.feature(topo, topo.objects.countries);
  geoFeatures = geo.features;

  const positions = [];
  const colors = [];
  for (let lat = -85; lat <= 85; lat += SAMPLE_STEP) {
    const circ = Math.max(Math.cos(lat*Math.PI/180), 0.04);
    const lonStep = SAMPLE_STEP / circ;
    for (let lon = -180; lon <= 180; lon += lonStep) {
      const f = countryAt(lon, lat);
      if (f) {
        const v = toVec(lon, lat, 1.0);
        positions.push(v.x, v.y, v.z);
        colors.push(DIM, DIM, DIM);
        dotCountry.push(nameOf(f));
      }
    }
  }
  dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  dotGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  globe.add(new THREE.Points(dotGeo, new THREE.PointsMaterial({ size: DOT_SIZE, vertexColors: true, sizeAttenuation: true })));
  document.getElementById('loader').style.display = 'none';

  // Now load saved trips from Supabase
  await loadTripsFromSupabase();
}

function nameOf(f){ return (f.properties && f.properties.name) || ('#'+f.id); }
function countryAt(lon, lat){ for (const f of geoFeatures){ if (d3.geoContains(f, [lon, lat])) return f; } return null; }

function setCountry(name, on){
  if (!dotGeo) return;
  const col = dotGeo.attributes.color;
  const v = on ? BRIGHT : DIM;
  for (let i = 0; i < dotCountry.length; i++){ if (dotCountry[i] === name) col.setXYZ(i, v, v, v); }
  col.needsUpdate = true;
}

function updateCount() {
  document.getElementById('count').textContent = Object.keys(trips).length;
}

async function loadTripsFromSupabase() {
  const { data: tripRows, error: e1 } = await sb.from('trips').select('id, country_name');
  if (e1) { console.error('Load trips failed:', e1); return; }

  const { data: photoRows, error: e2 } = await sb.from('photos').select('id, trip_id, storage_path');
  if (e2) { console.error('Load photos failed:', e2); return; }

  for (const t of tripRows) {
    const photos = photoRows
      .filter(p => p.trip_id === t.id)
      .map(p => ({
        id: p.id,
        storage_path: p.storage_path,
        url: sb.storage.from('photos').getPublicUrl(p.storage_path).data.publicUrl
      }));
    trips[t.country_name] = { id: t.id, photos };
    setCountry(t.country_name, true);
  }
  updateCount();
}

let dragging=false, lx=0, ly=0, vel=SPIN_SPEED, moved=0;
function down(x,y){ dragging=true; moved=0; lx=x; ly=y; hint.style.opacity='0'; }
function move(x,y){ if(!dragging)return; const dx=(x-lx)*0.005, dy=(y-ly)*0.005; globe.rotation.y+=dx; globe.rotation.x=Math.max(-1.15,Math.min(1.15,globe.rotation.x+dy)); vel=dx; lx=x; ly=y; moved+=Math.abs(dx)+Math.abs(dy); }
function up(){ dragging=false; }
canvas.addEventListener('mousedown', e=>down(e.clientX,e.clientY));
window.addEventListener('mousemove', e=>{ move(e.clientX,e.clientY); hover(e); });
window.addEventListener('mouseup', up);
canvas.addEventListener('touchstart', e=>{ const t=e.touches[0]; down(t.clientX,t.clientY); }, {passive:true});
canvas.addEventListener('touchmove', e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); }, {passive:true});
canvas.addEventListener('touchend', up);
canvas.addEventListener('wheel', e=>{ e.preventDefault(); cam.position.z=Math.max(1.6,Math.min(4.5,cam.position.z+e.deltaY*0.002)); }, {passive:false});

const ray=new THREE.Raycaster(), m=new THREE.Vector2();
function screenToLonLat(cx, cy){
  const r=canvas.getBoundingClientRect();
  m.x=((cx-r.left)/r.width)*2-1; m.y=-((cy-r.top)/r.height)*2+1;
  ray.setFromCamera(m, cam);
  const hit=ray.intersectObject(globe.children[0]);
  if(!hit.length) return null;
  const p=hit[0].point.clone(); globe.worldToLocal(p); p.normalize();
  const lat=90-Math.acos(p.y)*180/Math.PI;
  let lon=Math.atan2(p.z,-p.x)*180/Math.PI-180;
  while(lon<-180)lon+=360; while(lon>180)lon-=360;
  return [lon, lat];
}
function hover(e){
  if(dragging||!geoFeatures.length){ tooltip.style.opacity='0'; return; }
  const ll=screenToLonLat(e.clientX,e.clientY);
  const f=ll?countryAt(ll[0],ll[1]):null;
  if(f){ const r=stage.getBoundingClientRect(); tooltip.style.left=(e.clientX-r.left)+'px'; tooltip.style.top=(e.clientY-r.top)+'px'; tooltip.textContent=nameOf(f)+(trips[nameOf(f)]?' (visited)':''); tooltip.style.opacity='1'; canvas.style.cursor='pointer'; }
  else { tooltip.style.opacity='0'; canvas.style.cursor=dragging?'grabbing':'grab'; }
}
canvas.addEventListener('click', e=>{
  if(moved>0.01||overlay.classList.contains('open'))return;
  const ll=screenToLonLat(e.clientX,e.clientY);
  const f=ll?countryAt(ll[0],ll[1]):null;
  if(f) openModal(nameOf(f));
});

function openModal(name){
  const trip = trips[name];
  const photos = trip ? trip.photos : [];
  overlay.classList.add('open');
  modalEl.innerHTML =
    '<div class="row"><h2>'+name+'</h2><button class="closeBtn" id="x">&times;</button></div>'+
    (photos.length
      ? '<div class="grid">'+photos.map(p=>'<div class="ph"><img src="'+p.url+'"></div>').join('')+'</div>'
      : '<p class="empty">No photos yet. Add some from your trip to '+name+' and the dots will light up.</p>')+
    '<input type="file" id="file" accept="image/*" multiple style="display:none">'+
    '<button class="addBtn" id="add">'+(photos.length?'Add more photos':'Add photos')+'</button>'+
    '<div class="status" id="status"></div>';
  document.getElementById('x').onclick=()=>overlay.classList.remove('open');
  const fileInput=document.getElementById('file');
  const addBtn=document.getElementById('add');
  const statusEl=document.getElementById('status');
  addBtn.onclick=()=>fileInput.click();
  fileInput.onchange=async ()=>{
    const files=Array.from(fileInput.files||[]);
    if(!files.length)return;
    addBtn.disabled=true;
    try {
      // Ensure trip row exists
      let tripId;
      if (trips[name]) {
        tripId = trips[name].id;
      } else {
        statusEl.textContent='Creating trip...';
        const { data, error } = await sb.from('trips').insert({ country_name: name }).select('id').single();
        if (error) throw error;
        tripId = data.id;
        trips[name] = { id: tripId, photos: [] };
      }
      // Upload each file, then insert photo row
      for (let i=0; i<files.length; i++){
        const file = files[i];
        statusEl.textContent = 'Uploading '+(i+1)+' of '+files.length+'...';
        const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
        const path = tripId + '/' + Date.now() + '-' + i + '.' + ext;
        const { error: upErr } = await sb.storage.from('photos').upload(path, file, { contentType: file.type });
        if (upErr) throw upErr;
        const { data: photoRow, error: insErr } = await sb.from('photos').insert({ trip_id: tripId, storage_path: path }).select('id').single();
        if (insErr) throw insErr;
        const url = sb.storage.from('photos').getPublicUrl(path).data.publicUrl;
        trips[name].photos.push({ id: photoRow.id, storage_path: path, url });
      }
      setCountry(name, true);
      updateCount();
      openModal(name); // refresh modal with new photos
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'Error: ' + (err.message || 'upload failed');
      addBtn.disabled=false;
    }
  };
}
overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.classList.remove('open'); });

window.addEventListener('resize', ()=>{ W=stage.clientWidth; H=stage.clientHeight; cam.aspect=W/H; cam.updateProjectionMatrix(); renderer.setSize(W,H); });

function loop(){
  requestAnimationFrame(loop);
  if(!dragging){ if(spinChk.checked) globe.rotation.y+=SPIN_SPEED; else { globe.rotation.y+=vel; vel*=0.97; if(Math.abs(vel)<0.00005)vel=0; } }
  renderer.render(scene, cam);
}
loop();
build().catch(err=>{
  document.getElementById('loader').innerHTML = 'Could not load <code>countries.json</code>.<br><span style="color:#888;font-size:12px">Make sure it sits in the same folder as this file.<br>Reason: '+(err.message||'unknown')+'</span>';
  console.error(err);
});
</script>
</body>
</html>
