    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveEntries(entries) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (e) {

  }

function fmtNumber(n) { return String(n).padStart(3, '0'); }

function App() {

    if (!countries || typeof d3 === 'undefined') return [];
    // For MultiPolygon countries (France w/ overseas territories, USA w/ Alaska,
    // Russia spanning the antimeridian, etc.) the spherical centroid of the
    // whole feature can fall outside the main landmass. Use the largest
    // polygon's centroid instead so the marker pins to mainland.
    const mainCentroid = (f) => {
      const g = f.geometry;
      if (!g) return d3.geoCentroid(f);
      if (g.type === 'Polygon') return d3.geoCentroid(f);
      if (g.type === 'MultiPolygon') {
        let bestArea = -1;
        let bestPoly = null;
        for (const coords of g.coordinates) {
          const polyFeat = { type: 'Feature', geometry: { type: 'Polygon', coordinates: coords } };
          const area = d3.geoArea(polyFeat);
          if (area > bestArea) { bestArea = area; bestPoly = polyFeat; }
        }
        return bestPoly ? d3.geoCentroid(bestPoly) : d3.geoCentroid(f);
      }
      return d3.geoCentroid(f);
    };

    const out = [];
    for (const iso in entries) {
      const e = entries[iso];
      if (!e.visited || !e.photos || e.photos.length === 0) continue;
      const f = countries.features.find(x => x.properties.iso === iso);
      if (!f) continue;
      try {
        const c = mainCentroid(f);
        out.push({
          iso,
          lon: c[0],
          lat: c[1],
          photo: e.photos[0].src,
          count: e.photos.length,
          name: e.country || f.properties.name,
        });
      } catch (err) { /* skip degenerate geometry */ }
    }
    return out;
  }, [entries, countries]);

  const visitedCount = Object.keys(visitedMap).length;
  const totalCountries = countries ? countries.features.length : 195;
  const photoCount = useMemo(() => {
    let n = 0;
    for (const iso in entries) n += (entries[iso].photos || []).length;
    return n;
  }, [entries]);

  const handleCountryClick = useCallback((iso) => {
    if (!countries) return;
    const f = countries.features.find(x => x.properties.iso === iso);
    if (!f) return;
    // In viewer mode, only visited countries open.
    if (viewerMode && !entries[iso]) return;
    setModalCountry({ iso, name: f.properties.name, feature: f });
  }, [countries, viewerMode, entries]);

  const handleSave = (data) => {
    setEntries(e => ({ ...e, [modalCountry.iso]: { ...data, country: modalCountry.name } }));
    setModalCountry(null);
  };
  const handleDelete = () => {
    setEntries(e => {
      const next = { ...e };
      delete next[modalCountry.iso];
      return next;
    });
    setModalCountry(null);
  };

  const loadSampleData = () => {
    if (!countries) return;
    const sample = ['France', 'Japan', 'Italy', 'Iceland', 'Morocco', 'New Zealand', 'Peru'];
    const next = { ...entries };
    for (const name of sample) {
      const f = countries.features.find(x => x.properties.name === name);
      if (f) {
        next[f.properties.iso] = {
          country: name,
          title: `A week in ${name}`,
          notes: 'Filled by sample data — replace with your own memories.',
          dateFrom: '', dateTo: '',
          photos: [],
          visited: true,
          updated: Date.now(),
        };
      }
    }
    setEntries(next);
  };

  const resetAll = () => {
    if (window.confirm('Clear all visited countries and photos? This cannot be undone.')) {
      setEntries({});
    }
  };

  // ── Export / Import ──────────────────────────────────────────────────
  const exportTrips = () => {
    const payload = { version: 1, exportedAt: Date.now(), entries };
    const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `atlas-trips-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  };
  const triggerImport = () => importInputRef.current?.click();

  // ── Publish ──────────────────────────────────────────────────────────
  // Bake the current map (countries + photos + chosen visuals) into ONE
  // self-contained HTML file. It inlines all of the app's code, embeds the
  // data as a global, and forces viewer mode — drop it on any static host
  // (Netlify Drop, GitHub Pages, Vercel) and share the resulting URL.
  const [publishing, setPublishing] = useState(false);
  const publishFile = async () => {
    if (publishing) return;
    setPublishing(true);
    try {
      const here = window.location.href.split('?')[0].split('#')[0];
      const base = here.substring(0, here.lastIndexOf('/') + 1);
      const [shell, twSrc, modalSrc, globeSrc, appSrc] = await Promise.all([
        fetch(here).then(r => r.text()),
        fetch(base + 'tweaks-panel.jsx').then(r => r.text()),
        fetch(base + 'modal.jsx').then(r => r.text()),
        fetch(base + 'globe.jsx').then(r => r.text()),
        fetch(base + 'app.jsx').then(r => r.text()),
      ]);

      // Inline each external babel script in place of its <script src> tag.
      const inline = (src, code) =>
        `<script type="text/babel" data-from="${src}">\n${code.replace(/<\/script>/gi, '<\\/script>')}\n<\/script>`;
      let out = shell
        .replace('<script type="text/babel" src="tweaks-panel.jsx"><\/script>', inline('tweaks-panel.jsx', twSrc))
        .replace('<script type="text/babel" src="modal.jsx"><\/script>', inline('modal.jsx', modalSrc))
        .replace('<script type="text/babel" src="globe.jsx"><\/script>', inline('globe.jsx', globeSrc))
        .replace('<script type="text/babel" src="app.jsx"><\/script>', inline('app.jsx', appSrc));

      // Embed the data + visuals, defined BEFORE any app code runs.
      const data = JSON.stringify({ entries, tweaks }).replace(/<\//g, '<\\/');
      const dataScript = `<script>window.__ATLAS_PUBLISHED__ = ${data};<\/script>\n`;
      out = out.replace('<script type="text/babel"', dataScript + '<script type="text/babel"');

      const blob = new Blob([out], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my-travel-map.html';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
      alert(
        'Your shareable map was downloaded as “my-travel-map.html”.\n\n' +
        'It contains everything — your countries, photos, and look — in one file.\n\n' +
        'To get a link people can open:\n' +
        '1. Go to app.netlify.com/drop (free, no account needed)\n' +
        '2. Drag this file onto the page\n' +
        '3. Netlify gives you a public URL — share that.\n\n' +
        '(GitHub Pages or Vercel work too.) Opens read-only, so viewers can’t change your map.'
      );
    } catch (err) {
      console.error(err);
      alert('Could not publish: ' + err.message + '\nTry again, or use Export trip data instead.');
    } finally {
      setPublishing(false);
    }
  };

  const handleImport = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data || typeof data !== 'object' || !data.entries) {
        alert('That doesn\u2019t look like an Atlas trip file.');
        return;
      }
      const incoming = data.entries;
      const count = Object.keys(incoming).length;
      const proceed = Object.keys(entries).length === 0
        || window.confirm(`Replace your current ${Object.keys(entries).length} entries with ${count} entries from this file?`);
      if (proceed) setEntries(incoming);
    } catch (err) {
      alert('Couldn\u2019t read that file: ' + err.message);
    }
  };

  // URL to share that opens directly in viewer mode
  const shareViewerUrl = useMemo(() => {
    try {
      const u = new URL(window.location.href);
      u.searchParams.set('viewer', '1');
      u.hash = '';
      return u.toString();
    } catch { return ''; }
  }, []);
  const copyShareLink = async () => {
    try {
      await navigator.clipboard.writeText(shareViewerUrl);
      alert('Viewer link copied. Send it to a friend along with the exported .json file — they\u2019ll drag it in to load your map.');
    } catch {
      window.prompt('Copy this viewer link:', shareViewerUrl);
    }
  };

  return (
    <>
      <Globe
        ref={globeRef}
        onCountryClick={handleCountryClick}
        onCountriesLoaded={setCountries}
        visited={visitedMap}
        routes={routesMap}
        tweaks={tweaks}
        landing={landing}
        photoMarkers={photoMarkers}
      />

      <div className={`chrome ${landing ? 'is-landing' : ''}`}>
        <div className={`brand ${landing ? 'landing' : ''}`}>
          <div className="brand-text">
            <div className="brand-name">
              {Array.from("Valentina's travel album").map((ch, i) => (
                <span key={i} style={{ '--i': i }}>{ch === ' ' ? '\u00a0' : ch}</span>
              ))}
            </div>
          </div>
        </div>

        <div className="meta-strip">
          <div className="stat">
            <div className="label">Countries visited</div>
            <div className="value" style={{ color: tweaks.visitedColor }}>{visitedCount}</div>
          </div>
          <div className="stat">
            <div className="label">Current location</div>
            <div className="value" style={{ fontSize: 15, whiteSpace: 'nowrap' }}>Manhattan, NY</div>
          </div>
        </div>
      </div>

      {modalCountry && (
        <CountryModal
          country={modalCountry}
          entry={entries[modalCountry.iso]}
          onClose={() => setModalCountry(null)}
          onSave={handleSave}
          onDelete={handleDelete}
          accent={tweaks.visitedColor}
          viewLayout={tweaks.viewLayout}
          readOnly={viewerMode}
        />
      )}

      {zoom > 1.35 && (
        <div className="zoom-indicator">
          <button
            className="zoom-btn"
            onClick={() => globeRef.current?.resetZoom?.()}
            title="Reset zoom"
          >
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 8 V3 H8" />
              <path d="M21 8 V3 H16" />
              <path d="M3 16 V21 H8" />
              <path d="M21 16 V21 H16" />
            </svg>
          </button>
          <div className="zoom-value">{zoom.toFixed(1)}×</div>
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Globe" />
        <TweakToggle label="Auto-rotate" value={tweaks.autoSpin} onChange={(v) => setTweak('autoSpin', v)} />
        <TweakSelect
          label="Sphere"
          value={tweaks.sphereStyle}
          options={[
            { value: 'void', label: 'Void — pure black' },
            { value: 'ink', label: 'Ink — sharp edge' },
            { value: 'glass', label: 'Glass — subtle highlight' },
            { value: 'charcoal', label: 'Charcoal — lifted gray' },
            { value: 'ocean', label: 'Ocean — deep navy' },
            { value: 'halo', label: 'Halo — outer glow' },
          ]}
          onChange={(v) => setTweak('sphereStyle', v)}
        />
        <TweakSection label="Visited countries" />
        <TweakColor
          label="Accent"
          value={tweaks.visitedColor}
          options={['#f5c542', '#e85a4f', '#62c98a', '#5aa9e8', '#c084fc', '#f4f1ea']}
          onChange={(v) => setTweak('visitedColor', v)}
        />
        <TweakRadio
          label="Fill style"
          value={tweaks.fillStyle}
          options={[
            { value: 'wash', label: 'Wash' },
            { value: 'outline', label: 'Outline' },
            { value: 'bright', label: 'Bright' },
          ]}
          onChange={(v) => setTweak('fillStyle', v)}
        />
        <TweakSection label="View modal" />
        <TweakRadio
          label="Layout"
          value={tweaks.viewLayout}
          options={[
            { value: 'classic', label: 'Classic' },
            { value: 'sidebar', label: 'Sidebar' },
          ]}
          onChange={(v) => setTweak('viewLayout', v)}
        />
        {!urlViewer && (
          <>
            <TweakSection label="Sharing" />
            <TweakButton label={publishing ? 'Publishing…' : 'Publish shareable file'} onClick={publishFile} />
            <TweakToggle label="Preview as viewer" value={previewViewer} onChange={setPreviewViewer} />
            <TweakButton label="Export trip data" onClick={exportTrips} />
            <TweakButton label="Import trip data" onClick={triggerImport} />
            <TweakButton label="Copy viewer link" onClick={copyShareLink} secondary />
            <TweakSection label="Data" />
            <TweakButton label="Add sample memories" onClick={loadSampleData} />
            <TweakButton label="Clear everything" onClick={resetAll} secondary />
          </>
        )}
        {urlViewer && (
          <>
            <TweakSection label="Viewer" />
            <TweakButton label="Load a trip file" onClick={triggerImport} />
          </>
        )}
      </TweaksPanel>
      <input ref={importInputRef} type="file" accept=".json,application/json" style={{ display: 'none' }} onChange={handleImport} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
